# Workflow: build image from src/ and push to Azure Container Registry
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create env file from secret (runner only, not committed)
        env:
          ENV_CONTENT: ${{ secrets.ENV }}
        run: |
          # write secret to a file on the runner without printing it to logs
          printf '%s' "$ENV_CONTENT" > envfile
          chmod 600 envfile

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_REGISTRY }}      # e.g. myregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}      # ACR username (or service principal client id)
          password: ${{ secrets.ACR_PASSWORD }}      # ACR password (or service principal secret)

      - name: Build (context = src/) and push image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src
          push: true
          # customize repo/name as needed; using both latest and commit sha tags
          tags: |
            ${{ secrets.ACR_REGISTRY }}/chat-app:latest
            ${{ secrets.ACR_REGISTRY }}/chat-app:${{ github.sha }}
          # pass the envfile to BuildKit as a secret; Dockerfile uses this secret to create .env inside the image
          secrets: |
            id=env,src=envfile

      - name: Remove local env file from runner
        run: |
          # try to securely remove the file; fallback to rm -f
          shred -u envfile || rm -f envfile
